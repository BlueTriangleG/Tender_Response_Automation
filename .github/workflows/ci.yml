name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync backend environment
        run: cd backend && UV_CACHE_DIR=/tmp/pans-software-uv-cache uv sync --group dev

      - name: Run backend tests
        run: npm run test:backend
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Run backend lint
        run: npm run lint:backend

      - name: Run backend type-checks
        run: npm run typecheck:backend

      - name: Run frontend tests
        run: npm run test:frontend

      - name: Build frontend
        run: npm run build:frontend

      - name: Run live E2E suite
        run: npm run test:backend:live
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
